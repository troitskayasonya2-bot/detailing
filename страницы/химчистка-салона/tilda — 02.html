 <script>
    // ─── SCROLL REVEAL ───
    (function() {
      var revealEls = document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale');
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) entry.target.classList.add('visible');
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
      revealEls.forEach(function(el) { observer.observe(el); });
    })();

    // ─── SMOOTH SCROLL ───
    document.querySelectorAll('a[href^="#"]').forEach(function(a) {
      a.addEventListener('click', function(e) {
        var href = a.getAttribute('href');
        if (href === '#' || href.indexOf('#popup:') === 0) return;
        e.preventDefault();
        var target = document.querySelector(href);
        if (target) {
          var y = target.getBoundingClientRect().top + window.scrollY - 20;
          window.scrollTo({ top: y, behavior: 'smooth' });
        }
      });
    });

    // ─── FAQ ACCORDION ───
    function closeItem(item) {
      var body = item.querySelector('.faq-item__body');
      body.style.height = body.scrollHeight + 'px';
      item.classList.remove('open');
      requestAnimationFrame(function() { body.style.height = '0'; });
    }
    function openItem(item) {
      var body = item.querySelector('.faq-item__body');
      item.classList.add('open');
      body.style.height = body.scrollHeight + 'px';
      body.addEventListener('transitionend', function() {
        if (item.classList.contains('open')) body.style.height = 'auto';
      }, { once: true });
    }
    document.querySelectorAll('.faq-item__hd').forEach(function(hd) {
      hd.addEventListener('click', function() {
        var item = hd.closest('.faq-item');
        var isOpen = item.classList.contains('open');
        document.querySelectorAll('.faq-item.open').forEach(closeItem);
        if (!isOpen) openItem(item);
      });
    });

    // ─── PACKAGE SELECTION ───
    var pselCards = document.querySelectorAll('.psel-card');
    var pkgBtn = document.getElementById('pkgBtn');
    var pkgBtnText = document.getElementById('pkgBtnText');
    var pkgHint = document.getElementById('pkgHint');
    pselCards.forEach(function(card) {
      card.addEventListener('click', function() {
        pselCards.forEach(function(c) { c.classList.remove('selected'); });
        card.classList.add('selected');
        var name = card.dataset.pkg;
        pkgHint.innerHTML = 'Выбрано: <strong>' + name + '</strong>';
        pkgBtnText.textContent = 'Записаться';
        pkgBtn.removeAttribute('disabled');
      });
    });



    // ─── CLEAN SEO COLLAPSE ───
    document.addEventListener('click', function(e) {
      var cleanSeoToggle = e.target.closest('.clean-seo__toggle');
      if (!cleanSeoToggle) return;
      var box = cleanSeoToggle.closest('.clean-seo__text');
      if (!box) return;
      var isOpen = box.classList.toggle('expanded');
      cleanSeoToggle.textContent = isOpen ? 'Свернуть' : 'Подробнее';
      cleanSeoToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });

    // ─── INFINITE REVIEWS ───
    document.querySelectorAll('.reviews__track').forEach(function(track) {
      if (track.dataset.loopReady === 'true') return;
      Array.prototype.slice.call(track.children).forEach(function(card) {
        var clone = card.cloneNode(true);
        clone.setAttribute('aria-hidden', 'true');
        track.appendChild(clone);
      });
      track.dataset.loopReady = 'true';
    });

    // ─── TABLE SCROLL INDICATOR ───
    var tableScroll = document.getElementById('tableScroll');
    var tableOuter  = document.getElementById('tableOuter');
    if (tableScroll && tableOuter) {
      var checkScroll = function() {
        var atEnd = tableScroll.scrollLeft + tableScroll.clientWidth >= tableScroll.scrollWidth - 4;
        tableOuter.classList.toggle('no-fade', atEnd);
      };
      tableScroll.addEventListener('scroll', checkScroll, { passive: true });
      checkScroll();
    }

    // ─── FORM SUBMIT ───
    function handleFormSubmit(e, form) {
      e.preventDefault();

      var name    = (form.querySelector('[name="name"]')    || {}).value || '';
      var phone   = (form.querySelector('[name="phone"]')   || {}).value || '';
      var car     = (form.querySelector('[name="car"]')     || {}).value || '';
      var message = (form.querySelector('[name="message"]') || {}).value || '';

      var recBlock = document.getElementById('rec2247521391');
      var tForm    = recBlock ? recBlock.querySelector('form') : null;

      if (tForm) {
        var fName  = tForm.querySelector('[name="Name"], [name="name"]');
        var fPhone = tForm.querySelector('[name="Phone"], [name="phone"]');

        if (fName) {
          fName.value = name;
          fName.dispatchEvent(new Event('input',  { bubbles: true }));
          fName.dispatchEvent(new Event('change', { bubbles: true }));
        }
        if (fPhone) {
          fPhone.value = phone + (car ? ' | Авто: ' + car : '') + (message ? ' | ' + message : '');
          fPhone.dispatchEvent(new Event('input',  { bubbles: true }));
          fPhone.dispatchEvent(new Event('change', { bubbles: true }));
        }

        // кликаем кнопку Tilda-формы — запускает её JS-обработчик (CRM + TG)
        var tBtn = tForm.querySelector('[type="submit"]');
        if (tBtn) tBtn.click();
      }

      // очищаем поля кастомной формы
      form.reset();

      // сообщение успеха под кнопкой отправить
      var btn = form.querySelector('button[type="submit"], .btn');
      var existing = form.querySelector('.pride-success-msg');
      if (existing) existing.remove();
      var successMsg = document.createElement('div');
      successMsg.className = 'pride-success-msg';
      successMsg.textContent = 'Спасибо, заявка принята!';
      successMsg.style.cssText = 'margin-top:14px;padding:14px 18px;background:rgba(42,122,58,.15);border:1px solid #2a7a3a;color:#fff;font-family:inherit;font-size:14px;letter-spacing:.04em;border-radius:6px;text-align:center;';
      btn.parentNode.insertBefore(successMsg, btn.nextSibling);

      setTimeout(function() {
        if (successMsg.parentNode) successMsg.remove();
      }, 5000);

      return false;
    }
  </script>
</body>
</html>
