                        <script>
                        (function() {
                            var slider = null;
                            var track = null;
                            var raf = 0;
                            var pauseUntil = 0;
                            var isDragging = false;
                            var dragStartX = 0;
                            var dragStartScroll = 0;
                            var activePointerId = null;
                            var RESUME_MS = 3000;
                            var SPEED = 0.95;
                            var LOOP_EPS = 8;

                            function bumpPause() {
                                pauseUntil = Date.now() + RESUME_MS;
                            }

                            function loopWidth() {
                                if (!slider || !track)
                                    return 0;
                                var w = track.scrollWidth / 2;
                                return w > 0 ? w : slider.scrollWidth / 2;
                            }

                            function frame() {
                                raf = 0;
                                if (!slider)
                                    return;
                                if (window.__reviewsManualLock) {
                                    raf = requestAnimationFrame(frame);
                                    return;
                                }
                                var now = Date.now();
                                if (now < pauseUntil) {
                                    raf = requestAnimationFrame(frame);
                                    return;
                                }
                                var loopAt = loopWidth();
                                if (loopAt < 24 || slider.scrollWidth <= slider.clientWidth + 12) {
                                    raf = requestAnimationFrame(frame);
                                    return;
                                }
                                slider.scrollLeft += SPEED;
                                if (slider.scrollLeft >= loopAt - LOOP_EPS) {
                                    slider.scrollLeft -= loopAt;
                                }
                                raf = requestAnimationFrame(frame);
                            }

                            function bindSlider() {
                                slider = document.querySelector('#reviews .reviews__slider');
                                track = slider ? slider.querySelector('.reviews__track') : null;
                                if (!slider)
                                    return;

                                if (!slider.dataset.reviewsNavBound) {
                                    var prevBtn = document.querySelector('#reviews .reviews__nav-btn--prev');
                                    var nextBtn = document.querySelector('#reviews .reviews__nav-btn--next');
                                    var navStep = function() {
                                        return Math.max(260, Math.min(420, Math.round(slider.clientWidth * 0.66)));
                                    };
                                    var nudgeWithLoop = function(delta) {
                                        var loopAt = loopWidth();
                                        if (loopAt < 24) {
                                            slider.scrollBy({
                                                left: delta,
                                                behavior: 'smooth'
                                            });
                                            return;
                                        }
                                        var target = slider.scrollLeft + delta;
                                        if (target < 0)
                                            target += loopAt;
                                        if (target >= loopAt)
                                            target -= loopAt;
                                        slider.scrollTo({
                                            left: target,
                                            behavior: 'smooth'
                                        });
                                    };
                                    if (prevBtn) {
                                        prevBtn.addEventListener('click', function() {
                                            window.__reviewsManualLock = true;
                                            nudgeWithLoop(-navStep());
                                        });
                                    }
                                    if (nextBtn) {
                                        nextBtn.addEventListener('click', function() {
                                            window.__reviewsManualLock = true;
                                            nudgeWithLoop(navStep());
                                        });
                                    }
                                    slider.dataset.reviewsNavBound = '1';
                                }

                                if (slider.dataset.reviewsAutoBound)
                                    return;
                                slider.dataset.reviewsAutoBound = '1';
                                slider.style.cursor = 'grab';
                                ['touchstart', 'touchmove', 'pointerdown', 'wheel'].forEach(function(ev) {
                                    slider.addEventListener(ev, bumpPause, {
                                        passive: true
                                    });
                                });

                                slider.addEventListener('pointerdown', function(e) {
                                    if (e.pointerType === 'mouse' && e.button !== 0)
                                        return;
                                    isDragging = true;
                                    activePointerId = e.pointerId != null ? e.pointerId : null;
                                    dragStartX = e.clientX;
                                    dragStartScroll = slider.scrollLeft;
                                    bumpPause();
                                    slider.style.cursor = 'grabbing';
                                    if (slider.setPointerCapture && e.pointerId != null) {
                                        slider.setPointerCapture(e.pointerId);
                                    }
                                });

                                slider.addEventListener('pointermove', function(e) {
                                    if (!isDragging)
                                        return;
                                    if (activePointerId != null && e.pointerId != null && e.pointerId !== activePointerId)
                                        return;
                                    var deltaX = e.clientX - dragStartX;
                                    slider.scrollLeft = dragStartScroll - deltaX;
                                    bumpPause();
                                    if (e.cancelable)

                                }, {
                                    passive: false
                                });

                                function stopDrag(e) {
                                    if (!isDragging)
                                        return;
                                    if (activePointerId != null && e && e.pointerId != null && e.pointerId !== activePointerId)
                                        return;
                                    if (slider.releasePointerCapture && e && e.pointerId != null) {

                                    }
                                    isDragging = false;
                                    activePointerId = null;
                                    slider.style.cursor = 'grab';

                                slider.addEventListener('pointerleave', function() {

                                    }
                                });
                            }

                                passive: true
                            });

                                if (!window.__reviewsManualLock)

                                window.__reviewsManualLock = false;
                                bumpPause();
                            }, {
                                passive: true
                            });
                        })();
