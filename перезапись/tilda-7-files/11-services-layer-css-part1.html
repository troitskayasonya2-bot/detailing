                        .form-group input:focus ~ .form-group__label, .form-group textarea:focus ~ .form-group__label, .form-group input:not(:placeholder-shown) ~ .form-group__label, .form-group textarea:not(:placeholder-shown) ~ .form-group__label {

                            padding-top: 24px;
                            font-size: 12px;
                            color: var(--text-dim);
                        }/* ============================================
                           SCROLL REVEAL ANIMATION
                           ============================================ */
                        .reveal {
                            opacity: 0;
                            transform: translateY(40px);
                            transition: opacity 0.8s ease, transform 0.8s ease;
                        }

                        .reveal.visible {
                            opacity: 1;
                            transform: translateY(0);
                        }

                        .reveal-left {
                            opacity: 0;
                            transform: translateX(-40px);
                            transition: opacity 0.8s ease, transform 0.8s ease;
                        }

                        .reveal-left.visible {
                            opacity: 1;
                            transform: translateX(0);
                        }

                        .reveal-right {
                            opacity: 0;
                            transform: translateX(40px);
                            transition: opacity 0.8s ease, transform 0.8s ease;
                        }

                        .reveal-right.visible {
                            opacity: 1;
                            transform: translateX(0);
                        }

                        .reveal-scale {
                            opacity: 0;
                            transform: scale(0.9);
                            transition: opacity 0.8s ease, transform 0.8s ease;
                        }

                        .reveal-scale.visible {
                            opacity: 1;
                            transform: scale(1);
                        }/* Staggered delays */
                        .stagger-1 {
                            transition-delay: 0.1s;
                        }

                        .stagger-2 {
                            transition-delay: 0.2s;
                        }

                        .stagger-3 {
                            transition-delay: 0.3s;
                        }

                        .stagger-4 {
                            transition-delay: 0.4s;
                        }

                        .stagger-5 {
                            transition-delay: 0.5s;
                        }

                        .stagger-6 {
                            transition-delay: 0.6s;
                        }/* ============================================
                           MODAL
                           ============================================ */
                        .modal-overlay {
                            position: fixed;
                            inset: 0;
                            background: rgba(0, 0, 0, 0.85);
                            backdrop-filter: blur(8px);
                            z-index: 2000;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            opacity: 0;
                            visibility: hidden;
                            transition: var(--transition);
                        }

                        .modal-overlay.active {
                            opacity: 1;
                            visibility: visible;
                        }

                        .modal {
                            width: 90%;
                            max-width: 480px;
                            background: var(--bg-elevated);
                            border: 1px solid var(--border);
                            padding: 48px 40px;
                            position: relative;
                            transform: translateY(20px);
                            transition: transform var(--transition);
                        }

                        .modal-overlay.active .modal {
                            transform: translateY(0);
                        }

                        .modal__close {
                            position: absolute;
                            top: 16px;
                            right: 16px;
                            width: 36px;
                            height: 36px;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            font-size: 20px;
                            color: var(--text-muted);
                            cursor: pointer;
                            transition: var(--transition-fast);
                        }

                        .modal__close:hover {

                        }

                        .modal__title {
                            font-family: var(--font-heading);
                            font-size: 28px;
                            font-weight: 700;
                            text-transform: uppercase;
                            letter-spacing: 1px;
                            margin-bottom: 8px;

                        .modal__subtitle {

                            font-size: 14px;
                            margin-bottom: 32px;
                        }

                        .modal .form-group {
                            margin-bottom: 16px;

                           RESPONSIVE
