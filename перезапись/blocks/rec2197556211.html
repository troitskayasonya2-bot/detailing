                                cursor: pointer;
                                z-index: 101;
                            }

                            .burger span {
                                display: block;
                                height: 2px;
                                background: var(--text);
                                transition: var(--transition);
                                transform-origin: center;
                            }

                            .burger span:nth-child(2) {
                                width: 60%;
                                margin-left: auto;
                            }

                            .burger.active span:nth-child(1) {
                                transform: rotate(45deg) translate(5px, 5px);
                            }

                            .burger.active span:nth-child(2) {
                                opacity: 0;
                            }

                            .burger.active span:nth-child(3) {
                                transform: rotate(-45deg) translate(5px, -5px);
                            }/* Mobile Menu */
                            .mobile-menu {
                                position: fixed;
                                inset: 0;
                                background: rgba(10, 10, 10, 0.97);
                                backdrop-filter: blur(20px);
                                z-index: 100;
                                display: flex;
                                flex-direction: column;
                                justify-content: center;
                                align-items: center;
                                gap: 24px;
                                opacity: 0;
                                visibility: hidden;
                                transition: var(--transition);
                            }

                            .mobile-menu.active {
                                opacity: 1;
                                visibility: visible;
                            }

                            .mobile-menu a {
                                font-family: var(--font-heading);
                                font-size: 28px;
                                font-weight: 700;
                                text-transform: uppercase;
                                letter-spacing: 3px;
                                color: var(--text-muted);
                                transition: var(--transition-fast);
                                transform: translateY(20px);
                                opacity: 0;
                            }

                            .mobile-menu.active a {
                                transform: translateY(0);
                                opacity: 1;
                            }

                            .mobile-menu a:hover {
                                color: var(--gold);
                            }

                            .mobile-menu .mobile-submenu {
                                display: flex;
                                flex-direction: column;
                                gap: 8px;
                                padding-left: 20px;
                            }

                            .mobile-menu .mobile-submenu a {
                                font-size: 16px;
                                font-weight: 500;
                                letter-spacing: 2px;
                                color: var(--text-dim);
                            }/* ============================================
                               HERO
                               ============================================ */

                                inset: 0;
                                z-index: 0;

                                position: absolute;
                                inset: 0;

                                radial-gradient(ellipse at 70% 50%, rgba(232, 192, 48, 0.06) 0%, transparent 60%), radial-gradient(ellipse at 30% 80%, rgba(232, 192, 48, 0.03) 0%, transparent 50%), linear-gradient(180deg, var(--bg-dark) 0%, rgba(10, 10, 10, 0.3) 50%, var(--bg-dark) 100%);
                                z-index: 1;
                            }

                            .hero__bg-image {

                                url('data:image/svg+xml,
                                
                            <svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
                                <defs>
                                    <pattern id="t" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
                                        <rect x="2" y="0" width="8" height="16" rx="1" fill="rgba(255,255,255,0.035)"/>
                                        <rect x="14" y="4" width="8" height="12" rx="1" fill="rgba(255,255,255,0.025)"/>
                                        <rect x="26" y="1" width="8" height="14" rx="1" fill="rgba(255,255,255,0.035)"/>
                                        <rect x="2" y="20" width="8" height="16" rx="1" fill="rgba(255,255,255,0.025)"/>
                                        <rect x="14" y="24" width="8" height="12" rx="1" fill="rgba(255,255,255,0.035)"/>
                                        <rect x="26" y="21" width="8" height="14" rx="1" fill="rgba(255,255,255,0.025)"/>
                                    </pattern>
                                </defs>
                                <rect width="400" height="400" fill="url(%23t)"/>
                            </svg>
                            ') repeat;
                              opacity: 0.5;
                            }

                            .hero__content {
                              position: relative;
                              z-index: 2;
                              max-width: 720px;
                            }

                            .hero__badge {
                              display: inline-flex;
                              align-items: center;
                              gap: 8px;
                              padding: 6px 16px;
                              border: 1px solid var(--border-strong);
                              background: rgba(232, 192, 48, 0.05);
                              margin-bottom: 28px;
                              font-family: var(--font-heading);
                              font-size: 11px;
                              letter-spacing: 3px;
                              text-transform: uppercase;

                            .hero__badge-dot {

                              background: var(--gold);
                              border-radius: 50%;

                            }

                            @keyframes pulse {

                            .hero__title {

                              font-size: clamp(42px, 7vw, 80px);

                              text-transform: uppercase;
                              line-height: 1.0;
                              letter-spacing: 2px;

                            }

                            .hero__title .line {
                              display: block;
                              overflow: hidden;
                            }

                            .hero__title .gold {
                              background: linear-gradient(135deg, var(--gold-bright), var(--gold), var(--gold-dark));
                              -webkit-background-clip: text;
                              -webkit-text-fill-color: transparent;
                              background-clip: text;

                            .hero__desc {
                              font-size: 17px;

                              line-height: 1.7;

                            .hero__actions {
                              display: flex;
                              align-items: center;
                              gap: 20px;

                            .hero__stats {

                            .hero__stat {
                              display: flex;
                              flex-direction: column;
                            }

                            .hero__stat-num {
                              font-family: var(--font-heading);

                              font-weight: 700;
                              color: var(--gold);
                              line-height: 1;
                            }

                            .hero__stat-text {
                              font-size: 12px;
                              color: var(--text-muted);
                              text-transform: uppercase;
                              letter-spacing: 1px;
                              margin-top: 8px;
                            }

                            /* Hero decorative elements */
                            .hero__deco-line {
                              position: absolute;
                              right: 10%;
                              top: 50%;
                              transform: translateY(-50%);
                              width: 1px;
                              height: 200px;
                              background: linear-gradient(180deg, transparent, var(--gold-dark), transparent);
                              z-index: 2;
                              opacity: 0.3;
                            }

                            .hero__deco-circle {
                              position: absolute;
                              right: 8%;
                              top: 30%;

                              height: 300px;
                              border: 1px solid var(--border);
                              border-radius: 50%;
                              z-index: 1;
                              opacity: 0.2;
                            }

                            .hero__deco-circle::after {
                              content: '';
                              position: absolute;
                              inset: 30px;
                              border: 1px solid var(--border);
                              border-radius: 50%;
                            }

                            .hero__scroll {
                              position: absolute;
                              bottom: 32px;
                              left: 50%;
                              transform: translateX(-50%);

                              display: flex;
                              flex-direction: column;
                              align-items: center;
                              gap: 8px;

                              font-family: var(--font-heading);

                              letter-spacing: 3px;
                              text-transform: uppercase;
                              color: var(--text-dim);

                              width: 1px;
                              height: 40px;

                            .hero__scroll-line::after {
                              content: '';

                              left: 0;
                              width: 100%;
                              height: 100%;

                            @keyframes scrollLine {
                              0% { top: -100%; }
                              100% { top: 100%; }
                            }

                            /* ============================================
                               SERVICES — Asymmetric Bento Grid
                               ============================================ */
                            .services {
                              padding: 100px 0;
                              position: relative;
                              background: var(--bg-section);
                            }

                            .services__header {
                              margin-bottom: 56px;
                            }

                            .services__grid {
                              display: grid;
                              grid-template-columns: repeat(12, 1fr);
                              grid-auto-rows: minmax(200px, auto);
                              gap: 16px;
                            }

                            /* Asymmetric layout — 6 cards, different sizes */
                            .service-card:nth-child(1) { grid-column: 1 / 8; grid-row: 1 / 3; }
                            .service-card:nth-child(2) { grid-column: 8 / 13; grid-row: 1 / 2; }
                            .service-card:nth-child(3) { grid-column: 8 / 13; grid-row: 2 / 3; }
                            /* Bottom row — all equal height, aligned to same top/bottom */
                            .service-card:nth-child(4) { grid-column: 1 / 5; grid-row: 3 / 4; min-height: 260px; }
                            .service-card:nth-child(5) { grid-column: 5 / 9; grid-row: 3 / 4; min-height: 260px; }
                            .service-card:nth-child(6) { grid-column: 9 / 13; grid-row: 3 / 4; min-height: 260px; }

                            .service-card {
                              position: relative;
                              overflow: hidden;
                              background: var(--bg-card);
                              border: 1px solid var(--border);
                              cursor: pointer;
                              min-height: 220px;
                            }

                            .service-card__bg {
                              position: absolute;
                              inset: 0;
                              background-size: cover;
                              background-position: center;
                              transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
                              filter: brightness(0.5) saturate(0.6);
                            }

                            .service-card:hover .service-card__bg {
                              transform: scale(1.08);
                              filter: brightness(0.35) saturate(0.4);
                            }

                            /* srv-bg — alternative bg class used in services HTML */
                            .srv-bg {
                              position: absolute;
                              inset: 0;
                              transition: transform 0.7s ease;
                              overflow: hidden;
                            }

                            .srv-bg img {
                              width: 100%;
                              height: 100%;
                              object-fit: cover;
                              object-position: center;
                              display: block;
                            }

                            .service-card:hover .srv-bg {
                              transform: scale(1.04);
                            }

                            .srv-bg::after {
                              content: '';
                              position: absolute;
                              inset: 0;
                              background: linear-gradient(180deg, rgba(10,10,10,0.45) 0%, rgba(10,10,10,0.72) 40%, rgba(10,10,10,0.96) 100%);
                            }

                            .srv-num {
                              position: absolute;
                              top: 20px;
                              left: 24px;
                              font-family: var(--font-heading);
                              font-size: 13px;
                              font-weight: 600;
                              letter-spacing: 2px;
                              color: var(--gold);
                              z-index: 3;
                            }

                            .srv-content {
                              position: absolute;
                              left: 0;
                              right: 0;
                              bottom: 0;
                              padding: 20px 26px;
                              display: flex;
                              flex-direction: column;
                              z-index: 3;
                              background: linear-gradient(180deg, rgba(5,6,8,0) 4%, rgba(5,6,8,0.46) 36%, rgba(5,6,8,0.94) 100%);
                            }

                            .srv-tag {
                              font-family: var(--font-heading);
                              font-size: 9px;
                              letter-spacing: 3px;
                              text-transform: uppercase;
                              color: var(--gold);
                              margin-bottom: 4px;
                              opacity: 0;
                              transform: translateY(12px);
                              transition: transform .35s ease, opacity .3s ease;
                            }

                            .srv-title {
                              font-family: var(--font-heading);
                              font-size: clamp(16px, 1.8vw, 24px);
                              font-weight: 700;
                              text-transform: uppercase;
                              letter-spacing: 1px;
                              margin-bottom: 0;
                              line-height: 1.15;
                              color: #fff;
                              opacity: 1;
                              transform: translateY(0);
                              transition: transform .35s ease .05s, opacity .3s ease .05s;
                            }

                            .srv-desc {
                              font-size: 13px;
                              color: rgba(255,255,255,0.92);
                              line-height: 1.55;
                              max-width: 380px;
                            }

                            .srv-btn {
                              display: inline-flex;
                              align-items: center;
                              gap: 8px;
                              margin-top: 0;
                              padding: 10px 20px;
                              width: fit-content;
                              font-family: var(--font-heading);
                              font-size: 11px;
                              font-weight: 700;
                              letter-spacing: .18em;
                              text-transform: uppercase;
                              color: #0A0A0A;
                              border: 1.5px solid transparent;
                              background: linear-gradient(130deg, #F5E060 0%, #D4A020 45%, #F0C830 100%);
                              border-radius: var(--radius-control);
                              opacity: 1;
                              transition: color 0.35s ease, border-color 0.35s ease,
                                          background 0.35s ease, box-shadow 0.35s ease;
                              text-decoration: none;
                            }

                            .service-card:hover .srv-btn {
                              opacity: 1;
                              transform: translateY(0);
                            }

                            .srv-btn:hover {
                              background: transparent;
                              color: #E8C030;
                              border-color: rgba(240,210,60,.7);
                              box-shadow: 0 0 14px rgba(240,210,60,.15);
                            }

                            .srv-btn svg {
                              width: 14px;
                              height: 14px;
                              stroke: currentColor;
                              transition: transform 0.3s ease;
                            }

                            .srv-btn:hover svg {
                              transform: translateX(4px);
                            }

                            .service-card__overlay {
                              position: absolute;
                              inset: 0;
                              background: linear-gradient(180deg, transparent 30%, rgba(10, 10, 10, 0.9) 100%);
                              z-index: 1;
                            }

                            .service-card__content {
                              position: absolute;
                              bottom: 0;
                              left: 0;
                              right: 0;
                              padding: 28px;
                              z-index: 2;
                              transition: transform var(--transition);
                            }

                            .service-card__num {
                              font-family: var(--font-heading);
                              font-size: 13px;
                              color: var(--gold);
                              letter-spacing: 2px;
                              margin-bottom: 8px;
                              font-weight: 500;
                            }

                            .service-card__title {
                              font-family: var(--font-heading);
                              font-size: clamp(18px, 2vw, 26px);
                              font-weight: 700;
                              text-transform: uppercase;
                              letter-spacing: 1px;
                              margin-bottom: 8px;
                              line-height: 1.2;
                            }

                            .service-card__desc {
                              font-size: 13px;
                              color: var(--text-muted);
                              line-height: 1.5;
                              max-width: 400px;
                            }

                            .service-card__btn {
                              display: inline-flex;
                              align-items: center;
                              gap: 8px;
                              margin-top: 16px;
                              padding: 10px 20px;
                              border: 1px solid var(--gold);
                              font-family: var(--font-heading);
                              font-size: 11px;
                              font-weight: 600;
                              letter-spacing: 2px;
                              text-transform: uppercase;
                              color: var(--gold);
                              opacity: 0;
                              transform: translateY(12px);
                              transition: var(--transition);

                            .service-card:hover .service-card__btn {
                              opacity: 1;
                              transform: translateY(0);
                            }

                            .service-card__btn:hover {
                              background: var(--gold);
                              color: var(--bg-dark);
                            }

                            .service-card__corner {
                              position: absolute;
                              top: 20px;
                              right: 20px;
                              width: 40px;
                              height: 40px;
                              z-index: 2;
                            }

                            .service-card__corner::before,
                            .service-card__corner::after {
                              content: '';
                              position: absolute;
                              background: var(--gold);
                              opacity: 0.3;
                              transition: opacity var(--transition-fast);
                            }

                            .service-card__corner::before {
                              top: 0;
                              right: 0;
                              width: 20px;
                              height: 1px;
                            }

                            .service-card__corner::after {
                              top: 0;
                              right: 0;
                              width: 1px;
                              height: 20px;
                            }

                            .service-card:hover .service-card__corner::before,
                            .service-card:hover .service-card__corner::after {
                              opacity: 0.7;
                            }

                            /* ============================================
                               WHY US
                               ============================================ */
                            .why-us {
                              padding: 100px 0;
                              position: relative;
                            }

                            .why-us__grid {
                              display: grid;
                              grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                              gap: 24px;
                              margin-top: 56px;
                            }

                            .why-card {
                              padding: 36px 28px;
                              background: var(--bg-card);
                              border: 1px solid var(--border);
                              position: relative;
                              overflow: hidden;
                              transition: var(--transition);
                            }

                            .why-card::before {
                              content: '';
                              position: absolute;
                              top: 0;
                              left: 0;
                              width: 3px;
                              height: 0;
                              background: var(--gold);
                              transition: height 0.6s ease;
                            }

                            .why-card:hover::before {
                              height: 100%;
                            }

                            .why-card:hover {
                              border-color: var(--border-strong);
                              transform: translateY(-4px);
                              box-shadow: var(--shadow-gold);
                            }

                            .why-card__icon {
                              width: 48px;
                              height: 48px;
                              display: flex;
                              align-items: center;
                              justify-content: center;
                              margin-bottom: 20px;
                              color: var(--gold);
                            }

                            .why-card__icon svg {
                              width: 32px;
                              height: 32px;
                              stroke: var(--gold);
                              fill: none;
                              stroke-width: 1.5;
                            }

                            .why-card__title {
                              font-family: var(--font-heading);
                              font-size: 18px;
                              font-weight: 700;
                              text-transform: uppercase;
                              letter-spacing: 1px;
                              margin-bottom: 12px;
                            }

                            .why-card__text {
                              font-size: 14px;
                              color: var(--text-muted);
                              line-height: 1.7;
                            }

                            .why-card__num {
                              position: absolute;
                              top: 16px;
                              right: 20px;
                              font-family: var(--font-heading);
                              font-size: 52px;
                              font-weight: 700;
                              color: transparent;
                              -webkit-text-stroke: 1px var(--border);
                              line-height: 1;
                              user-select: none;
                            }

                            /* ============================================
                               PORTFOLIO — Before / After
                               ============================================ */
                            .portfolio {
                              padding: 100px 0;
                              background: var(--bg-section);
                              position: relative;
                            }

                            .portfolio__grid {
                              display: grid;
                              grid-template-columns: repeat(2, 1fr);
                              gap: 24px;
                              margin-top: 56px;
                            }

                            .portfolio-card {
                              position: relative;
                              overflow: hidden;
                              border: 1px solid var(--border);
                              background: var(--bg-card);
                              aspect-ratio: 16/10;
                            }

                            .portfolio-card__slider {
                              position: relative;
                              width: 100%;
                              height: 100%;
                              cursor: col-resize;
                              touch-action: none; /* предотвращает перехват touch iOS для скролла */
                              -webkit-user-select: none;
                              user-select: none;
                            }

                            .portfolio-card__before,
                            .portfolio-card__after {
                              position: absolute;
                              inset: 0;
                              background-size: cover;
                              background-position: center;
                            }

                            .portfolio-card__before {
                              clip-path: inset(0 50% 0 0);
                              will-change: clip-path;
                            }

                            .portfolio-card__divider {
                              position: absolute;
                              top: 0;
                              bottom: 0;
                              left: 50%;
                              width: 3px;
                              background: var(--gold);
                              z-index: 3;
                              transform: translateX(-50%);
                              will-change: left;
                            }

                            .portfolio-card__slider.is-dragging {
                              cursor: grabbing;
                            }

                            .portfolio-card__divider::before {
                              content: '';
                              position: absolute;
                              top: 50%;
                              left: 50%;
                              transform: translate(-50%, -50%);
                              width: 36px;
                              height: 36px;
                              background: var(--gold);
                              border-radius: 50%;
                            }

                            .portfolio-card__divider::after {
                              content: '';
                              position: absolute;
                              top: 50%;
                              left: 50%;
                              transform: translate(-50%, -50%);
                              width: 36px;
                              height: 36px;
                              line-height: 36px;
                              text-align: center;
                              font-size: 0;
                              color: var(--bg-dark);
                              z-index: 2;
                              font-weight: 700;
                              display: none;
                            }

                            /* На мобилке SVG вставляется через JS — скрываем эмодзи */
                            .portfolio-card__divider.svg-fixed::after {
                              display: none !important;
                            }

                            .portfolio-card__label {
                              display: none;
                            }

                            .portfolio-card__label--before { left: 16px; }
                            .portfolio-card__label--after { right: 16px; }

                            .portfolio-card__tag {
                              position: absolute;
                              bottom: 16px;
                              left: 16px;
                              right: 16px;
                              z-index: 4;
                              font-family: var(--font-heading);
                              font-size: clamp(12px, 1.2vw, 15px);
                              font-weight: 600;
                              letter-spacing: .03em;
                              text-transform: none;
                              margin: 0;
                              color: var(--text);
                              text-shadow: 0 2px 8px rgba(0,0,0,.7);
                            }

                            /* ============================================
                               PRICES
                               ============================================ */
                            .prices {
                              padding: 100px 0;
                              position: relative;
                            }

                            .prices__tabs {
                              display: flex;
                              flex-wrap: wrap;
                              gap: 8px;
                              margin-top: 40px;
                              margin-bottom: 40px;
                            }

                            .prices__tab {
                              font-family: var(--font-heading);
                              font-size: 11px;
                              font-weight: 700;
                              letter-spacing: .18em;
                              text-transform: uppercase;
                              padding: 11px 22px;
                              border: 1.5px solid rgba(240,210,60,.35);
                              color: var(--text-muted);
                              background: rgba(240,210,60,.03);
                              border-radius: var(--radius-control);
                              cursor: pointer;
                              transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease,
                                          border-color 0.25s ease, color 0.25s ease;
                            }

                            .prices__tab:hover {
                              border-color: rgba(240,210,60,.7);
                              color: #E8C840;
                              background: rgba(240,210,60,.08);
                            }

                            .prices__tab.active {
                              background: linear-gradient(130deg, #F5E060 0%, #D4A020 45%, #F0C830 100%);
                              color: #0A0A0A;
                              border-color: transparent;
                              box-shadow: 0 0 20px rgba(240,210,60,.35), 0 4px 16px rgba(0,0,0,.4);
                            }

                            .prices__panel {
                              display: none;
                            }

                            .prices__panel.active {
                              display: block;
                              animation: fadeInUp 0.4s ease;
                            }

                            @keyframes fadeInUp {
                              from { opacity: 0; transform: translateY(16px); }
                              to { opacity: 1; transform: translateY(0); }
                            }

                            .prices__table-wrap {
                              overflow-x: auto;
                              border: 1px solid var(--border);
                              background: var(--bg-card);
                            }

                            .prices__table {
                              width: 100%;
                              border-collapse: collapse;
                              min-width: 640px;
                            }

                            .prices__table thead {
                              background: rgba(232, 192, 48, 0.08);
                            }

                            .prices__table th {
                              font-family: var(--font-heading);
                              font-size: 12px;
                              font-weight: 600;
                              letter-spacing: 1.5px;
                              text-transform: uppercase;
                              text-align: left;
                              padding: 16px 20px;
                              color: var(--gold);
                              border-bottom: 1px solid var(--border);
                              white-space: nowrap;
                            }

                            .prices__table td {
                              padding: 14px 20px;
                              font-size: 14px;
                              color: var(--text-muted);
                              border-bottom: 1px solid rgba(232, 192, 48, 0.06);
                              white-space: nowrap;
                            }

                            .prices__table tbody tr {
                              transition: background var(--transition-fast);
                            }

                            .prices__table tbody tr:hover {
                              background: rgba(232, 192, 48, 0.03);
                            }

                            .prices__table td:first-child {
                              color: var(--text);
                              font-weight: 500;
                            }

                            .prices__table .price-val {
                              font-family: var(--font-heading);
                              font-weight: 600;
                              color: var(--text);
                            }

                            .prices__note {
                              margin-top: 20px;
                              font-size: 13px;
                              color: var(--text-dim);
                              display: flex;
                              align-items: center;
                              gap: 8px;
                            }

                            .prices__note::before {
                              content: ' * ';
                              color: var(--gold);
                              font-size: 18px;
                            }

                            /* ============================================
                               STAGES
                               ============================================ */
                            .stages {
                              padding: 100px 0;
                              background: var(--bg-section);
                              position: relative;
                            }

                            .srv-4 .srv-num, .srv-5 .srv-num, .srv-6 .srv-num { display: none; }

                            .stages__timeline {
                              display: grid;
                              grid-template-columns: repeat(6, 1fr);
                              gap: 0;
                              margin-top: 56px;
                              position: relative;
                            }

                            /* Full line in dark — starts after step 01 dot, ends before step 06 dot */
                            .stages__timeline::before {
                              content: '';
                              position: absolute;
                              top: 36px;
                              left: calc(8.33% + 38px);
                              right: calc(8.33% + 38px);
                              height: 2px;
                              background: var(--border);
                              z-index: 0;
                            }

                            /* Golden line from step 01 dot, stops halfway to step 02 */
                            .stages__timeline::after {
                              content: '';
                              position: absolute;
                              top: 36px;
                              left: calc(8.33% + 38px);
                              width: calc(8.33% - 20px);
                              height: 2px;
                              background: linear-gradient(90deg, var(--gold), var(--gold-dark));
                              box-shadow: 0 0 12px rgba(232,192,48,0.4);
                              z-index: 1;
                            }

                            .stage-item {
                              padding: 0 24px;
                              position: relative;
                              text-align: center;
                              display: flex;
                              flex-direction: column;
                              align-items: center;
                            }

                            .stage-item__dot {
                              width: 72px;
                              height: 72px;
                              border: 2px solid var(--border);
                              background: var(--bg-section);
                              display: flex;
                              align-items: center;
                              justify-content: center;
                              margin: 0 auto 24px;
                              position: relative;
                              z-index: 3;
                              transition: var(--transition);
                              box-shadow: 0 0 0 6px var(--bg-section);
                            }

                            /* Step 01 is always lit gold */
                            .stage-item:first-child .stage-item__dot {
                              border-color: var(--gold);
                              background: rgba(232,192,48,0.08);
                              box-shadow: 0 0 30px rgba(232, 192, 48, 0.3), inset 0 0 20px rgba(232,192,48,0.05);
                            }

                            .stage-item:hover .stage-item__dot {
                              border-color: var(--gold);
                              box-shadow: 0 0 30px rgba(232, 192, 48, 0.15);
                            }

                            .stage-item__num {
                              font-family: var(--font-heading);
                              font-size: 24px;
                              font-weight: 700;
                              color: var(--gold);
                            }

                            .stage-item__title {
                              font-family: var(--font-heading);
                              font-size: 16px;
                              font-weight: 700;
                              text-transform: uppercase;
                              letter-spacing: 1px;
                              margin-bottom: 0;
                              min-height: 2.6em;
                              display: flex;
                              align-items: center;
                              justify-content: center;
                            }

                            .stage-item__text {
                              font-size: 13px;
                              color: var(--text-muted);
                              line-height: 1.6;
                              max-height: 0;
                              overflow: hidden;
                              opacity: 0;
                              transition: max-height 0.35s ease, opacity 0.3s ease, margin 0.3s ease;
                            }

                            /* ============================================================
                               ЧБ — новый дизайн главной для Тильды
                               Этот слой добавлен поверх блока 01, чтобы при замене ничего не сломалось.
                               ============================================================ */

                            .pride-tilda {
                              --gold: #ffffff;
                              --gold-light: #ffffff;
                              --gold-bright: #ffffff;
                              --gold-dark: #d7dbe0;
                              --gold-deep: #8f969e;
                              --border: rgba(255,255,255,.13);
                              --border-strong: rgba(255,255,255,.24);

                              color: var(--text) !important;
                            }

                            html {
                              scrollbar-color: #fff #08090b !important;
                            }

                            html::-webkit-scrollbar {
                              width: 8px !important;
                              height: 8px !important;
                            }

                            html::-webkit-scrollbar-track {
                              background: #08090b !important;
                            }

                            html::-webkit-scrollbar-thumb {
                              background: #fff !important;
                              border-radius: 4px !important;
                            }

                            .pride-tilda #hero {
                              background: #070809 !important;
                            }

                            .pride-tilda #hero .hero-bg {
                              overflow: hidden !important;
                              background: #070809 !important;
                            }

                            /* Без общего затемнения картинки. Градиент оставлен только слева под текстом. */
                            .pride-tilda #hero .hero-bg::before,
                            .pride-tilda #hero .hero-video::before,
                            .pride-tilda #hero .hero-video::after {
                              display: none !important;
                              opacity: 0 !important;
                              background: none !important;
                            }

                            .pride-tilda #hero .hero-bg::after {
                              content: '' !important;
                              display: block !important;
                              position: absolute !important;
                              inset: 0 !important;
                              z-index: 1 !important;
                              pointer-events: none !important;
                              opacity: 1 !important;
                              background:
                                linear-gradient(90deg, rgba(7,8,9,.96) 0%, rgba(7,8,9,.82) 23%, rgba(7,8,9,.38) 45%, rgba(7,8,9,0) 68%) !important;
                            }

                            .pride-tilda #hero .hero-video {
                              position: absolute !important;
                              top: 0 !important;
                              right: 0 !important;
                              bottom: 0 !important;
                              left: 0 !important;
                              width: 100% !important;
                              height: 100% !important;
                              opacity: 1 !important;
                              filter: none !important;
                              background-image: url("https://static.tildacdn.com/tild3861-3335-4933-b562-336639623065/image_1603.svg") !important;
                              background-size: contain !important;
                              background-position: center center !important;
                              background-repeat: no-repeat !important;
                            }

                            .pride-tilda #hero .hero-video iframe {
                              display: none !important;
                            }

                            .pride-tilda #hero .hero-grid,
                            .pride-tilda #hero .tire-bg {
                              display: none !important;
                            }

                            .pride-tilda .hero-content {
                              isolation: isolate;
                            }

                            .pride-tilda .hero-h1 {
                              max-width: 980px !important;
                              margin: 0 0 22px !important;
                              color: #fff !important;
                              font-family: var(--font-heading) !important;
                              font-size: clamp(46px, 6.8vw, 104px) !important;
                              font-weight: 900 !important;
                              line-height: .92 !important;
                              letter-spacing: .04em !important;
                              word-spacing: 0.15em !important;
                              text-transform: uppercase !important;
                              text-shadow: 0 18px 44px rgba(0,0,0,.74) !important;
                            }

                            .pride-tilda .hero-h1__big,

                              display: block !important;
                              color: #fff !important;
                              font: inherit !important;
                              font-weight: 700 !important;
                            }

                            .pride-tilda .hero-h1__small {
                              margin-top: 0 !important;
                              font-size: 1em !important;
                              line-height: .92 !important;
                              white-space: normal !important;
                            }

                            .pride-tilda .hero-sub {
                              max-width: 620px;
                              font-size: clamp(13px, 1.25vw, 16px) !important;
                              font-weight: 400 !important;
                              line-height: 1.55 !important;
                              color: rgba(245, 240, 232, .86) !important;
                              text-shadow: 0 10px 28px rgba(0, 0, 0, .72);
                            }

                            .pride-tilda .hero-stats {
                              align-items: stretch !important;
                              gap: 14px !important;
                              border-top-color: rgba(255, 255, 255, .18) !important;
                            }

                            .pride-tilda .hero-stats > div {
                              width: 170px !important;
                              min-width: 170px !important;
                              max-width: 170px !important;
                              min-height: 118px !important;
                              padding: 16px 18px;
                              border: 1px solid rgba(255,255,255,.13);
                              border-radius: 18px;
                              background: rgba(8, 9, 11, .34);
                              backdrop-filter: blur(8px);
                              overflow: hidden;
                            }

                            .pride-tilda .hero-stats > div:nth-child(2) {
                              width: 255px !important;
                              min-width: 255px !important;
                              max-width: 255px !important;
                            }

                            .pride-tilda .hero-stats > div:nth-child(3) {
                              width: 190px !important;
                              min-width: 190px !important;
                              max-width: 190px !important;
                            }

                            .pride-tilda .stat-num {
                              display: block !important;
                              width: 100% !important;
                              min-height: 80px !important;
                              color: #fff !important;
                              font-family: var(--font-heading) !important;
                              font-size: clamp(52px, 6vw, 80px) !important;
                              font-weight: 700 !important;
                              line-height: 1 !important;
                              font-variant-numeric: tabular-nums !important;
                              white-space: nowrap !important;
                              letter-spacing: 0 !important;
                            }

                            .pride-tilda .stat-label {
                              display: block !important;
                              color: #fff !important;
                              font-size: 10px !important;
                              line-height: 1.25 !important;
                              letter-spacing: .08em !important;
                              white-space: nowrap !important;
                              text-transform: uppercase !important;
                            }

                            .pride-tilda #services,
                            .pride-tilda .section,
                            .pride-tilda .section--alt,
                            .pride-tilda .stages,
                            .pride-tilda .prices,
                            .pride-tilda .faq,
                            .pride-tilda .contact,
                            .pride-tilda .footer {
                              background:
                                radial-gradient(900px 540px at 100% 0%, rgba(255, 255, 255, .075), transparent 62%),
                                linear-gradient(180deg, #0b0b0c 0%, #101216 48%, #090a0c 100%) !important;
                            }

                            .pride-tilda .section-title,
                            .pride-tilda .section__title {
                              color: #fff !important;
                              letter-spacing: .015em;
                            }

                            .pride-tilda .section-sub,
                            .pride-tilda .section__subtitle {
                              color: rgba(245, 240, 232, .66) !important;
                            }

                            .pride-tilda .section-label,
                            .pride-tilda .srv-tag {
                              border: 1px solid rgba(255,255,255,.14) !important;
                              border-radius: var(--radius-control) !important;
                              background: rgba(255,255,255,.045) !important;
                              color: rgba(255,255,255,.72) !important;
                            }

                            .pride-tilda .section-title .gold,
                            .pride-tilda .section__title span,
                            .pride-tilda .hero-h1 .gold,
                            .pride-tilda .gold,
                            .pride-tilda .gold-shimmer,
                            .pride-tilda .price-val,
                            .pride-tilda .stage-item__num,
                            .pride-tilda .contact-item__icon,
                            .pride-tilda .contact-item__icon svg,
                            .pride-tilda .footer__col-title,
                            .pride-tilda .review-card__stars svg,
                            .pride-tilda .srv-num {
                              color: #fff !important;
                              fill: #fff !important;
                              stroke: #fff !important;
                              -webkit-text-fill-color: #fff !important;
                              background: none !important;
                            }

                            .pride-tilda .service-card,
                            .pride-tilda .portfolio-card,
                            .pride-tilda .review-card,
                            .pride-tilda .faq-item,
                            .pride-tilda .faq__visual,
                            .pride-tilda .prices__table-wrap,
                            .pride-tilda .contact__form,
                            .pride-tilda .contact-item,
                            .pride-tilda .stage-item__dot {
                              border-radius: 22px !important;
                              border-color: rgba(255, 255, 255, .13) !important;
                              background:
                                linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.025)) !important;
                              box-shadow: 0 22px 58px rgba(0, 0, 0, .34) !important;
                            }

                            .pride-tilda .service-card:hover,
                            .pride-tilda .portfolio-card:hover,
                            .pride-tilda .faq-item:hover {
                              border-color: rgba(255, 255, 255, .26) !important;
                              transform: translateY(-2px);
                            }

                            .pride-tilda .review-card:hover {
                              border-color: rgba(255, 255, 255, .26) !important;
                              transform: none !important;

                            /* Reviews track: JS-controlled, no CSS animation */

                              background-size: cover !important;
                              background-position: center !important;
                            }

                            .pride-tilda .portfolio-card:nth-child(1) .portfolio-card__before {

                              background-size: cover !important;
                              background-position: center !important;
                            }

                            .pride-tilda .portfolio-card:nth-child(2) .portfolio-card__after {
                              background-image: url('https://static.tildacdn.com/tild6564-3366-4435-b665-313936343930/image_154.svg') !important;
                              background-size: cover !important;
                              background-position: center !important;
                            }

                            .pride-tilda .portfolio-card:nth-child(2) .portfolio-card__before {
                              background-image: url('https://static.tildacdn.com/tild3266-3131-4631-b935-653131366437/image_155.svg') !important;
                              background-size: cover !important;
                              background-position: center !important;
                            }

                            .pride-tilda .portfolio-card:nth-child(3) .portfolio-card__after {
                              background-image: url('https://static.tildacdn.com/tild6436-3965-4662-b133-626464383933/8e03f19db0bb55941ad6.jpg') !important;
                              background-size: cover !important;
                              background-position: center !important;
                            }

                            .pride-tilda .portfolio-card:nth-child(3) .portfolio-card__before {
                              background-image: url('https://static.tildacdn.com/tild3835-3130-4837-a331-626463323364/image_156.svg') !important;
                              background-size: cover !important;
                              background-position: center !important;
                            }

                            .pride-tilda .portfolio-card:nth-child(4) .portfolio-card__after {
                              background-image: url('https://static.tildacdn.com/tild3436-3134-4166-b938-656435393933/6a3f1e85ea779d04cda1.svg') !important;
                              background-size: cover !important;
                              background-position: center !important;
                            }

                            .pride-tilda .portfolio-card:nth-child(4) .portfolio-card__before {
                              background-image: url('https://static.tildacdn.com/tild3430-3636-4335-b038-666434306136/image_159.svg') !important;
                              background-size: cover !important;
                              background-position: center !important;
                            }

                            .pride-tilda .vertical-media {
                              background:
                                radial-gradient(900px 540px at 100% 0%, rgba(255,255,255,.075), transparent 62%),
                                linear-gradient(180deg, #090a0c 0%, #101216 52%, #0b0b0c 100%) !important;
                            }

                            .pride-tilda .vertical-media__grid {
                              display: grid;
                              grid-template-columns: repeat(10, minmax(0, 1fr));
                              grid-template-rows: repeat(8, 150px);
                              gap: 16px;
                              grid-auto-flow: dense;
                              width: 100%;
                              margin-top: 42px;
                            }

                            .pride-tilda .vertical-media__item {
                              min-height: 0;
                              border: 1px solid rgba(255,255,255,.13);
                              border-radius: 22px;
                              background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.025));
                              padding: 10px;
                              box-shadow: 0 22px 58px rgba(0,0,0,.34);
                            }

                            .pride-tilda .vertical-media__slot {
                              width: 100%;
                              height: 100%;
                              min-height: 0;
                              border: 1px solid rgba(255,255,255,.16);
                              border-radius: 16px;
                              display: grid;
                              place-items: center;
                              background:
                                linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02)),
                                #090a0c;
                              color: rgba(255,255,255,.72);
                              font-family: var(--font-heading);
                              font-size: 13px;
                              font-weight: 700;
                              letter-spacing: .18em;
                              text-transform: uppercase;
                              overflow: hidden;
                            }

                            .pride-tilda .vertical-media__slot img,
                            .pride-tilda .vertical-media__slot iframe {
                              display: block;
                              width: 100%;
                              height: 100%;
                              border: 0;
                            }

                            .pride-tilda .vertical-media__slot img {
                              object-fit: contain;
                              object-position: center;
                              background: #050607;
                            }

                            .pride-tilda .vertical-media__slot iframe {
                              background: #050607;
                            }

                            .pride-tilda .vertical-media__item--video iframe {
                              transform: scaleX(1.18) scaleY(1.08);
                              transform-origin: center;
                            }

                            .pride-tilda .vertical-media__item--photo-1 {
                              grid-column: 1 / 5;
                              grid-row: 1 / 3;
                            }

                            .pride-tilda .vertical-media__item--video-1 {
                              grid-column: 5 / 8;
                              grid-row: 1 / 5;
                            }

                            .pride-tilda .vertical-media__item--video-2 {
                              grid-column: 8 / 11;
                              grid-row: 1 / 5;
                            }

                            .pride-tilda .vertical-media__item--photo-2 {
                              grid-column: 1 / 3;
                              grid-row: 3 / 5;
                            }

                            .pride-tilda .vertical-media__item--photo-3 {
                              grid-column: 3 / 5;
                              grid-row: 3 / 5;
                            }

                            .pride-tilda .vertical-media__item--video-3 {
                              grid-column: 1 / 4;
                              grid-row: 5 / 9;
                            }

                            .pride-tilda .vertical-media__item--photo-4 {
                              grid-column: 4 / 11;
                              grid-row: 5 / 7;
                            }

                            .pride-tilda .vertical-media__item--photo-5 {
                              grid-column: 4 / 7;
                              grid-row: 7 / 9;
                            }

                            .pride-tilda .vertical-media__item--photo-6 {
                              grid-column: 7 / 11;
                              grid-row: 7 / 9;
                            }

                            .pride-tilda .vertical-media__item--photo-1 img {
                              object-position: center 30%;
                              transform: translateY(-20%) scale(1.04);
                            }

                            .pride-tilda .vertical-media__item--photo-2 img,
                            .pride-tilda .vertical-media__item--photo-3 img,
                            .pride-tilda .vertical-media__item--photo-5 img,
                            .pride-tilda .vertical-media__item--photo-6 img {
                              transform: translateY(-7%) scale(1.02);
                            }

                            /* Десктоп: фото 2/3 должны заполнять слот без полос снизу/по бокам */
                            .pride-tilda .vertical-media__item--photo-2 img,
                            .pride-tilda .vertical-media__item--photo-3 img {
                              object-fit: cover !important;
                              object-position: center center !important;
                              transform: translateY(-2%) scale(1.02) !important;
                            }

                            .pride-tilda .vertical-media__item--photo-4 img {
                              object-fit: cover !important;
                              transform: translateY(-6%) scale(1.04);
                            }

                            .pride-tilda .vertical-media__item--photo-5 img {
                              object-fit: cover !important;
                              transform: translateY(-16%) scale(1.02);
                            }

                            .pride-tilda .vertical-media__item--photo-6 img {
                              object-fit: cover !important;
                              transform: translateY(-30%) scale(1.06);

                                var styleId = 'portfolio-slider-hardfix-runtime';
                                if (document.getElementById(styleId))
                                    return;
                                var style = document.createElement('style');
                                style.id = styleId;
                                style.textContent = [
                                '.portfolio-card__divider::before,.portfolio-card__divider::after{content:none !important;display:none !important;}',
                                '.portfolio-card__divider{transform:translateX(-50%) !important;}',
                                '.portfolio-card__slider{touch-action:none !important;-webkit-user-select:none !important;user-select:none !important;}',
                                '.portfolio-card__divider-handle{position:absolute !important;top:50% !important;left:50% !important;transform:translate(-50%,-50%) !important;z-index:5 !important;pointer-events:none !important;width:36px !important;height:36px !important;border-radius:50% !important;background:#fff !important;display:flex !important;align-items:center !important;justify-content:center !important;}',
                                '.portfolio-card__divider-handle svg{width:24px !important;height:24px !important;display:block !important;}',
                                '.portfolio-card__divider-handle svg path{stroke:#0A0A0A !important;stroke-width:2.2 !important;}',
                                '@media (max-width:980px){html body .portfolio-card__divider-handle{width:40px !important;height:40px !important;}html body .portfolio-card__divider-handle svg{width:22px !important;height:22px !important;}html body .portfolio-card__divider-handle svg path{stroke-width:2 !important;}html body .portfolio-card__divider{width:3px !important;}}'
                                ].join('');
                                document.head.appendChild(style);
                            }

                            function clamp(value, min, max) {
                                return Math.max(min, Math.min(max, value));
                            }

                            function updateSlider(slider, x) {
                                var before = slider.querySelector('.portfolio-card__before');
                                var divider = slider.querySelector('.portfolio-card__divider');
                                if (!before || !divider)
                                    return;

                                var rect = slider.getBoundingClientRect();
                                if (!rect.width)
                                    return;

                                var px = clamp(x - rect.left, 24, rect.width - 24);
                                var percent = (px / rect.width) * 100;

                                before.style.setProperty('clip-path', 'inset(0 ' + (100 - percent) + '% 0 0)', 'important');
                                divider.style.setProperty('left', percent + '%', 'important');
                            }

                            function applyHandleStyles(divider) {
                                if (!divider)
                                    return;
                                var isMobile = window.matchMedia('(max-width: 980px)').matches;
                                var handleSize = isMobile ? 40 : 36;
                                var svgSize = isMobile ? 22 : 24;
                                var strokeWidth = isMobile ? '2' : '2.2';
                                var dividerWidth = isMobile ? '3px' : '3px';

                                divider.style.setProperty('width', dividerWidth, 'important');
                                divider.style.setProperty('transform', 'translateX(-50%)', 'important');

                                var handle = divider.querySelector('.portfolio-card__divider-handle');
                                if (!handle)
                                    return;

                                var handleStyle = {
                                    'position': 'absolute',
                                    'top': '50%',
                                    'left': '50%',
                                    'transform': 'translate(-50%, -50%)',
                                    'z-index': '5',
                                    'pointer-events': 'none',
                                    'width': handleSize + 'px',
                                    'height': handleSize + 'px',
                                    'min-width': handleSize + 'px',
                                    'min-height': handleSize + 'px',
                                    'border-radius': '50%',
                                    'background': '#ffffff',
                                    'display': 'flex',
                                    'align-items': 'center',
                                    'justify-content': 'center',
                                    'box-shadow': '0 2px 6px rgba(0,0,0,.15)'
                                };
                                Object.keys(handleStyle).forEach(function(k) {
                                    handle.style.setProperty(k, handleStyle[k], 'important');
                                });

                                var svg = handle.querySelector('svg');
                                if (svg) {
                                    svg.style.setProperty('width', svgSize + 'px', 'important');
                                    svg.style.setProperty('height', svgSize + 'px', 'important');
                                    svg.style.setProperty('display', 'block', 'important');
                                    svg.style.setProperty('position', 'static', 'important');
                                    svg.style.setProperty('top', 'auto', 'important');
                                    svg.style.setProperty('left', 'auto', 'important');
                                    svg.style.setProperty('transform', 'none', 'important');
                                    svg.setAttribute('width', svgSize);
                                    svg.setAttribute('height', svgSize);

                                    var path = svg.querySelector('path');
                                    if (path) {
                                        path.style.setProperty('stroke', '#0A0A0A', 'important');
                                        path.style.setProperty('stroke-width', strokeWidth, 'important');
                                        path.style.setProperty('fill', 'none', 'important');
                                        path.setAttribute('stroke', '#0A0A0A');
                                        path.setAttribute('stroke-width', strokeWidth);
                                    }
                                }

                            function ensureDividerHandle(slider) {
                                var divider = slider.querySelector('.portfolio-card__divider');
                                if (!divider)
                                    return;

                                    divider.insertAdjacentHTML('beforeend', handleHtml);
                                }

                            }

                            function initSlider(slider) {
                                if (!slider)
                                    return;
                                ensureDividerHandle(slider);
                                if (slider.dataset.sliderReady === '1')

                                slider.style.setProperty('-webkit-user-select', 'none', 'important');
                                slider.style.setProperty('user-select', 'none', 'important');

                                var dragging = false;
                                var activePointerId = null;

                                function getEventX(event) {
                                    if (!event)
                                        return null;
                                    if (typeof event.clientX === 'number')
                                        return event.clientX;
                                    if (event.touches && event.touches[0])
                                        return event.touches[0].clientX;
                                    if (event.changedTouches && event.changedTouches[0])
                                        return event.changedTouches[0].clientX;
                                    return null;
                                }

                                function updateFromEvent(event) {
                                    var x = getEventX(event);
                                    if (x == null)
                                        return;
                                    updateSlider(slider, x);
                                }

                                function startDrag(event) {
                                    dragging = true;
                                    activePointerId = event.pointerId != null ? event.pointerId : null;
                                    slider.classList.add('is-dragging');
                                    if (event.cancelable)
                                        event.preventDefault();
                                    updateFromEvent(event);
                                    if (slider.setPointerCapture && event.pointerId != null) {
                                        slider.setPointerCapture(event.pointerId);
                                    }
                                }

                                function moveDrag(event) {
                                    if (!dragging)
                                        return;
                                    if (event.pointerId != null && activePointerId != null && event.pointerId !== activePointerId)
                                        return;
                                    if (event.cancelable)
                                        event.preventDefault();
                                    updateFromEvent(event);
                                }

                                function endDrag(event) {
                                    if (!dragging)
                                        return;
                                    if (event && event.pointerId != null && activePointerId != null && event.pointerId !== activePointerId)
                                        return;
                                    dragging = false;
                                    activePointerId = null;
                                    slider.classList.remove('is-dragging');
                                    if (event && slider.releasePointerCapture && event.pointerId != null) {
                                        slider.releasePointerCapture(event.pointerId);
                                    }
                                }

                                slider.addEventListener('pointerdown', startDrag, {
                                    passive: false
                                });
                                slider.addEventListener('click', function(event) {
                                    updateFromEvent(event);
                                }, {
                                    passive: true
                                });
                                slider.addEventListener('touchstart', function(event) {
                                    updateFromEvent(event);
                                }, {
                                    passive: false
                                });

                                document.addEventListener('pointermove', moveDrag, {
                                    passive: false
                                });
                                document.addEventListener('pointerup', endDrag);
                                document.addEventListener('pointercancel', endDrag);

                                slider.addEventListener('touchstart', function(event) {
                                    if (!event.touches || !event.touches[0])

                                    dragging = true;
                                    slider.classList.add('is-dragging');
                                    if (event.cancelable)
                                        event.preventDefault();
                                    updateFromEvent(event);
                                }, {
                                    passive: false
                                });

                                document.addEventListener('touchmove', function(event) {
                                    if (!dragging || !event.touches || !event.touches[0])
                                        return;
                                    if (event.cancelable)
                                        event.preventDefault();
                                    updateFromEvent(event);
                                }, {
                                    passive: false
                                });

                                document.addEventListener('touchend', endDrag, {
                                    passive: true
                                });
                                document.addEventListener('touchcancel', endDrag, {
                                    passive: true
                                });

                                updateSlider(slider, slider.getBoundingClientRect().left + slider.getBoundingClientRect().width * 0.5);
                            }

                            function reapplyAllHandles() {
                                document.querySelectorAll('.portfolio-card__slider .portfolio-card__divider').forEach(applyHandleStyles);
                            }

                            function initAllSliders() {
                                injectSliderStyles();
                                document.querySelectorAll('.portfolio-card__slider').forEach(initSlider);
                                reapplyAllHandles();
                            }

                            if (document.readyState === 'loading') {
                                document.addEventListener('DOMContentLoaded', initAllSliders);
                            } else {
                                initAllSliders();
                            }
                            window.addEventListener('resize', function() {
                                initAllSliders();
                                reapplyAllHandles();
                            });
                            window.addEventListener('orientationchange', function() {
                                initAllSliders();
                                reapplyAllHandles();
                            });

                            // Tilda can re-render blocks after initial load

                            setTimeout(initAllSliders, 1000);

                            });
                            sliderObserver.observe(document.documentElement, {
                                childList: true,
                                subtree: true
                            });
                        })();
